services:
  yt_downloader_api:
    container_name: yt-downloader
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      HOST_PATH_SOURCE_PREFIX: ${HOST_PATH_SOURCE_PREFIX}
      HOST_PATH_MOUNT_PREFIX: ${HOST_PATH_MOUNT_PREFIX}
      LOG_LEVEL: ${LOG_LEVEL}
      MAX_ACTIVE_JOBS: ${MAX_ACTIVE_JOBS}
      JOB_ACQUIRE_TIMEOUT_S: ${JOB_ACQUIRE_TIMEOUT_S}
      YTDLP_CONCURRENT_FRAGMENTS: ${YTDLP_CONCURRENT_FRAGMENTS}
      FFMPEG_THREADS: ${FFMPEG_THREADS}
      STREAM_CHUNK_SIZE_KB: ${STREAM_CHUNK_SIZE_KB}
    volumes:
      - ${HOST_PATH_SOURCE_PREFIX}:${HOST_PATH_MOUNT_PREFIX}
    cpus: "${CONTAINER_CPUS}"
    mem_limit: "${CONTAINER_MEM_LIMIT}"
    pids_limit: ${CONTAINER_PIDS_LIMIT}
    restart: unless-stopped
