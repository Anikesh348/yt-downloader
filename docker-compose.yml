services:
  yt_downloader_api:
    container_name: yt-downloader
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      HOST_PATH_SOURCE_PREFIX: ${HOST_PATH_SOURCE_PREFIX:-/Users}
      HOST_PATH_MOUNT_PREFIX: /hostfs
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      MAX_ACTIVE_JOBS: ${MAX_ACTIVE_JOBS:-2}
      JOB_ACQUIRE_TIMEOUT_S: ${JOB_ACQUIRE_TIMEOUT_S:-2.0}
      YTDLP_CONCURRENT_FRAGMENTS: ${YTDLP_CONCURRENT_FRAGMENTS:-1}
      FFMPEG_THREADS: ${FFMPEG_THREADS:-1}
      STREAM_CHUNK_SIZE_KB: ${STREAM_CHUNK_SIZE_KB:-256}
    volumes:
      - ${DOWNLOADS_HOST_DIR:-./downloads}:/downloads
      - ${HOST_PATH_SOURCE_PREFIX:-/Users}:/hostfs
    cpus: "${CONTAINER_CPUS:-2.0}"
    mem_limit: "${CONTAINER_MEM_LIMIT:-2g}"
    pids_limit: ${CONTAINER_PIDS_LIMIT:-256}
    restart: unless-stopped
